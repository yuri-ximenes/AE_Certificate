version: 2

models:
  - name: int_sales_order_reasons
    description: >
      Agrega os múltiplos motivos de venda de cada pedido em campos texto únicos.
      Usa collect_set + array_join para eliminar duplicatas e concatenar os valores.
      Granularidade: 1 linha por pedido de venda.
    columns:
      - name: pk_salesorder
        description: Chave do pedido de venda (PK desta dimensão, coincide com fk_salesorder da fato).
      - name: order_reasons
        description: Lista de nomes dos motivos do pedido, separados por vírgula.
      - name: order_reason_types
        description: Lista dos tipos de motivo do pedido, separados por vírgula.
