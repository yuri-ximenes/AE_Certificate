version: 2

models:
  - name: int_products
    description: >
      Enriquece produtos com hierarquia completa de categoria.
      Combina stg_production__product, stg_production__productsubcategory e
      stg_production__productcategory via joins consecutivos.
      Granularidade: 1 linha por produto.
    columns:
      - name: pk_product
        description: Chave primária do produto, originada de stg_production__product.
      - name: product_name
        description: Nome do produto.
      - name: listprice
        description: Preço de lista do produto.
      - name: standardcost
        description: Custo padrão de produção do produto.
      - name: profit
        description: Margem bruta calculada como listprice - standardcost.
      - name: subcategory_name
        description: Nome da subcategoria (pode ser nulo para produtos sem subcategoria).
      - name: category_name
        description: Nome da categoria (pode ser nulo para produtos sem categoria).
