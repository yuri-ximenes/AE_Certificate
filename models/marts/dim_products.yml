version: 2

models:
  - name: dim_products
    description: "Dimensão de produtos com hierarquia de subcategoria e categoria."
    columns:
      - name: productid
        description: "PK da dimensão. Identificador único do produto."
        tests:
          - unique
          - not_null

      - name: product_name
        description: "Nome do produto."
        tests:
          - not_null

      - name: listprice
        description: "Preço de lista do produto."
        tests:
          - not_null

      - name: standardcost
        description: "Custo padrão de fabricação do produto."
        tests:
          - not_null

      - name: profit
        description: "Margem bruta unitária (listprice - standardcost)."
        tests:
          - not_null

      - name: subcategory_name
        description: "Nome da subcategoria. Pode ser nulo para produtos sem subcategoria."

      - name: category_name
        description: "Nome da categoria. Pode ser nulo para produtos sem subcategoria."
