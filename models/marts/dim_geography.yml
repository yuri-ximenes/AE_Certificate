version: 2

models:
  - name: dim_geography
    description: "Dimensão geográfica baseada no endereço de entrega (ship-to) dos pedidos."
    columns:
      - name: addressid
        description: "PK da dimensão. Identificador único do endereço de entrega."
        tests:
          - unique
          - not_null

      - name: city
        description: "Cidade do endereço de entrega."
        tests:
          - not_null

      - name: stateprovincecode
        description: "Código ISO do estado/província."
        tests:
          - not_null

      - name: stateprovince_name
        description: "Nome do estado/província."
        tests:
          - not_null

      - name: countryregioncode
        description: "Código ISO do país."
        tests:
          - not_null

      - name: country_name
        description: "Nome do país."
        tests:
          - not_null

      - name: territory_name
        description: "Nome do território de vendas."

      - name: territory_group
        description: "Grupo geográfico do território (ex: North America, Europe, Pacific)."
