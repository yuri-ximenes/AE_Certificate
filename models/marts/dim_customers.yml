version: 2

models:
  - name: dim_customers
    description: "Dimensão de clientes pessoa física. Exclui clientes do tipo loja (B2B)."
    columns:
      - name: customerid
        description: "PK da dimensão. Identificador único do cliente."
        tests:
          - unique
          - not_null

      - name: accountnumber
        description: "Número de conta único do cliente."
        tests:
          - not_null

      - name: firstname
        description: "Primeiro nome do cliente."
        tests:
          - not_null

      - name: lastname
        description: "Sobrenome do cliente."
        tests:
          - not_null

      - name: middlename
        description: "Nome do meio do cliente."

      - name: title
        description: "Título de cortesia (Mr., Ms., Dr., etc.)."

      - name: persontype
        description: "Tipo de pessoa. Esperado: IN (Individual customer)."
        tests:
          - accepted_values:
              values: ['IN']
