version: 2

models:
  - name: dim_dates
    description: "Dimensão de datas gerada via date spine. Cobre o período 2011-01-01 a 2014-12-31."
    columns:
      - name: date_day
        description: "PK da dimensão. Data no formato YYYY-MM-DD."
        tests:
          - unique
          - not_null

      - name: year
        description: "Ano (ex: 2013)."
        tests:
          - not_null

      - name: quarter
        description: "Trimestre do ano (1 a 4)."
        tests:
          - not_null

      - name: month
        description: "Mês do ano (1 a 12)."
        tests:
          - not_null

      - name: month_name
        description: "Nome do mês (ex: January, February)."
        tests:
          - not_null

      - name: week_of_year
        description: "Semana do ano (1 a 53)."
        tests:
          - not_null

      - name: day_of_week
        description: "Dia da semana (1=Domingo, 7=Sábado)."
        tests:
          - not_null

      - name: day_of_week_name
        description: "Nome do dia da semana (ex: Monday, Tuesday)."
        tests:
          - not_null

      - name: is_weekend
        description: "Indica se a data é um final de semana (true/false)."
        tests:
          - not_null
