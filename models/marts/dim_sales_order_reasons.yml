version: 2

models:
  - name: dim_sales_order_reasons
    description: >
      Dimensão de motivos de venda agregados por pedido. Grão: 1 linha por pedido.
      Os motivos são concatenados em string para eliminar o fan-out do relacionamento M:N original.
    columns:
      - name: salesorderid
        description: "PK da dimensão. FK para fact_sales_order_details."
        tests:
          - unique
          - not_null

      - name: order_reasons
        description: "Motivos de venda concatenados (ex: 'Price, Quality')."
        tests:
          - not_null

      - name: order_reason_types
        description: "Tipos dos motivos de venda concatenados (ex: 'Other, Marketing')."
        tests:
          - not_null
