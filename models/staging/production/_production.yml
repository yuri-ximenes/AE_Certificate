version: 2

sources:
  - name: production
    database: fea_academy
    schema: adventure_works
    tables:
      - name: production_product
        description: "Produtos vendidos ou usados na fabricação da Adventure Works."
        columns:
          - name: productid
            description: "PK do produto."
            data_tests:
              - unique
              - not_null
          - name: name
            description: "Nome do produto."
            data_tests:
              - not_null
          - name: listprice
            description: "Preço de lista do produto."
            data_tests:
              - not_null
          - name: standardcost
            description: "Custo padrão de fabricação do produto."
            data_tests:
              - not_null
          - name: productsubcategoryid
            description: "FK para production_productsubcategory. Nulo se o produto não pertence a nenhuma subcategoria."

      - name: production_productsubcategory
        description: "Subcategorias de produtos (nível intermediário da hierarquia)."
        columns:
          - name: productsubcategoryid
            description: "PK da subcategoria."
            data_tests:
              - unique
              - not_null
          - name: productcategoryid
            description: "FK para production_productcategory."
            data_tests:
              - not_null
          - name: name
            description: "Nome da subcategoria."
            data_tests:
              - not_null

      - name: production_productcategory
        description: "Categorias de produtos (nível mais alto da hierarquia: Bikes, Components, Clothing, Accessories)."
        columns:
          - name: productcategoryid
            description: "PK da categoria."
            data_tests:
              - unique
              - not_null
          - name: name
            description: "Nome da categoria."
            data_tests:
              - not_null
