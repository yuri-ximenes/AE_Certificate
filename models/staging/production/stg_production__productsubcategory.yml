version: 2

models:
  - name: stg_production__productsubcategory
    description: Staging de subcategorias de produto. Renomeia colunas com prefixos pk_/fk_.
    columns:
      - name: pk_productsubcategory
        description: Chave primária da subcategoria.
        data_tests:
          - unique
          - not_null
      - name: fk_productcategory
        description: FK para stg_production__productcategory.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_production__productcategory')
                field: pk_productcategory
      - name: subcategory_name
        description: Nome da subcategoria do produto.
