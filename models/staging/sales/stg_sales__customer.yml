version: 2

models:
  - name: stg_sales__customer
    description: >
      Staging de clientes pessoa física. Exclui clientes B2B (personid nulo) via
      cláusula WHERE na fonte. Renomeia colunas com prefixos pk_/fk_.
    columns:
      - name: pk_customer
        description: Chave primária do cliente.
        data_tests:
          - unique
          - not_null
      - name: fk_person
        description: FK para stg_person__person. Sempre não-nulo após filtro WHERE personid is not null.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_person__person')
                field: pk_person
      - name: fk_store
        description: FK para a loja associada. Nulo para clientes pessoa física.
      - name: fk_territory
        description: FK para stg_sales__salesterritory. Pode ser nulo.
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_sales__salesterritory')
                field: pk_territory
